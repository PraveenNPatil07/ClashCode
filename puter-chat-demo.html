<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puter GPT-5.6 Sol Chat</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #081120;
      color: #e5eefc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
        linear-gradient(180deg, #020617 0%, #0f172a 50%, #020617 100%);
      padding: 24px;
    }

    .app {
      width: min(720px, 100%);
      background: rgba(8, 17, 32, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.95);
      color: #e5eefc;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: rgba(56, 189, 248, 0.75);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      background: #38bdf8;
      color: #082032;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .response {
      margin-top: 20px;
      min-height: 220px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(2, 6, 23, 0.65);
      white-space: pre-wrap;
      line-height: 1.7;
      color: #dbe7fb;
    }

    .muted {
      color: #94a3b8;
    }

    .error {
      color: #fecaca;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Puter GPT-5.6 Sol Demo</h1>
    <p>Frontend-only chat using Puter.js and <code>openai/gpt-5.6-sol</code>.</p>

    <div class="controls">
      <input id="messageInput" type="text" placeholder="Ask something..." maxlength="2000" />
      <button id="sendButton" type="button">Send</button>
    </div>

    <section id="response" class="response muted">Your model response will appear here.</section>
  </main>

  <script>
    const input = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const responseBox = document.getElementById('response');

    function setResponse(text, isError = false) {
      responseBox.textContent = text;
      responseBox.classList.toggle('muted', !text || text === 'Your model response will appear here.' || text === 'Thinking...');
      responseBox.classList.toggle('error', isError);
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) {
        setResponse('Please enter a message before sending.', true);
        input.focus();
        return;
      }

      sendButton.disabled = true;
      input.disabled = true;
      setResponse('Thinking...');

      try {
        const result = await puter.ai.chat(message, {
          model: 'openai/gpt-5.6-sol'
        });

        const content = result?.message?.content ?? String(result ?? 'No response returned.');
        setResponse(content || 'No response returned.');
      } catch (error) {
        const messageText = error instanceof Error
          ? error.message
          : 'The request failed. Please check your network connection and Puter sign-in state.';

        setResponse(`Error: ${messageText}`, true);
      } finally {
        sendButton.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    sendButton.addEventListener('click', () => {
      void sendMessage();
    });

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        void sendMessage();
      }
    });
  </script>
</body>
</html>
